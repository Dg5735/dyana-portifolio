<!DOCTYPE html>
<html>
<head>
    <title>Ascending Number Sorter</title>
</head>
<body>
    <h1>Ascending Number Sorter</h1>

    <p>Enter numbers separated by commas:</p>

    <input type="text" id="numbers" placeholder="5, 2, 8, 1, 3">
    <button onclick="sortNumbers()">Sort</button>

    <h3>Result:</h3>
    <p id="result"></p>

    <script>
        function sortNumbers() {
            let input = document.getElementById("numbers").value;

            let numbers = input
                .split(",")
                .map(num => Number(num.trim()))
                .sort((a, b) => a - b);

            document.getElementById("result").innerHTML =
                numbers.join(", ");
        }
    </script>
</body>
</html>
